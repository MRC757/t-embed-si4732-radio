; ============================================================
; T-Embed SI4732 — PlatformIO Configuration
; Board: LILYGO T-Embed SI4732 (ESP32-S3)
; ============================================================

[platformio]
default_envs = t-embed-si4732

[env:t-embed-si4732]
platform          = espressif32@^6.0.0
; lilygo-t-display-s3 uses the same ESP32-S3 N16R8 module as T-Embed SI4732:
;   16MB QIO flash + 8MB OPI PSRAM, memory_type=qio_opi already configured in board JSON.
board             = lilygo-t-display-s3
framework         = arduino

; Custom partitions: 4MB app + 8MB LittleFS on 16MB flash
board_build.partitions = partitions/app4M_lfs8M_16MB.csv
board_build.filesystem = littlefs

; Upload / Monitor
; Set upload_port to the COM port assigned to the T-Embed.
; Run: pio device list   to find the correct port (e.g. COM3, COM7, /dev/ttyUSB0).
upload_port     = COM7
upload_speed    = 921600
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize

; Build flags
build_flags =
    -DBOARD_HAS_PSRAM
    ; TFT_eSPI: force SPI_PORT=2 (IDF SPI2 register index) for ESP32-S3.
    ; Without this, TFT_eSPI defaults to FSPI=0 which maps to the flash
    ; controller registers, causing StoreProhibited crash in begin_tft_write().
    -DUSE_FSPI_PORT
    ; USB CDC (USB is JTAG/upload port on T-Embed)
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; Logging level (0=None 1=Error 2=Warn 3=Info 4=Debug 5=Verbose)
    -DCORE_DEBUG_LEVEL=3
    ; TFT_eSPI — select T-Embed SI4732 user setup
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=170
    -DTFT_HEIGHT=320
    -DTFT_MISO=-1
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=13
    -DTFT_RST=9
    -DTFT_BL=15
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=6000000
    ; Project-level defines
    -DWIFI_SSID=\"your_wifi_ssid\"
    -DWIFI_PASS=\"your_wifi_password\"
    -DAP_SSID=\"T-Embed-Radio\"
    -DAP_PASS=\"radiopass\"

; Dependencies
lib_deps =
    https://github.com/pu2clr/SI4735.git
    bodmer/TFT_eSPI@^2.5.43
    mathieucarbou/ESPAsyncWebServer@^3.3.0
    mathieucarbou/AsyncTCP@^3.2.0
    fastled/FastLED@^3.9.0
    bblanchon/ArduinoJson@^7.0.0
    madhephaestus/ESP32Encoder@^0.10.2
    lewisxhe/XPowersLib@^0.2.6

; Extra scripts to build LittleFS filesystem image and upload it
extra_scripts =
    pre:scripts/pre_build.py
    post:scripts/post_build.py
