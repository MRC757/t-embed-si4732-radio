<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T-Embed SI4732 Web Radio</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- ========================================================
       HEADER
  ======================================================== -->
  <header>
    <div id="header-left">
      <span id="connection-dot" class="dot dot-disconnected" title="WebSocket status"></span>
      <span id="connection-label">Connecting…</span>
    </div>
    <div id="header-center">T-Embed SI4732</div>
    <div id="header-right">
      <span id="bat-display" title="Battery"></span>
    </div>
  </header>

  <!-- ========================================================
       FREQUENCY DISPLAY
  ======================================================== -->
  <section id="freq-section">
    <div id="freq-display">
      <span id="freq-value">---</span>
      <span id="freq-unit">MHz</span>
    </div>
    <div id="mode-band-row">
      <span id="mode-badge" class="badge">FM</span>
      <span id="band-label">FM</span>
      <span id="stereo-badge" class="badge badge-stereo hidden">STEREO</span>
      <span id="rds-name" class="rds-text"></span>
    </div>
    <div id="rds-info"></div>
  </section>

  <!-- ========================================================
       SIGNAL METERS
  ======================================================== -->
  <section id="meters-section">
    <div class="meter-row">
      <span class="meter-label">RSSI</span>
      <div class="meter-bar-bg">
        <div id="rssi-bar" class="meter-bar meter-rssi"></div>
        <div id="rssi-peak" class="meter-peak"></div>
      </div>
      <span id="rssi-value" class="meter-value">0</span>
    </div>
    <div class="meter-row">
      <span class="meter-label">SNR</span>
      <div class="meter-bar-bg">
        <div id="snr-bar" class="meter-bar meter-snr"></div>
      </div>
      <span id="snr-value" class="meter-value">0</span>
    </div>
  </section>

  <!-- Audio unavailable notice -->
  <div id="audio-notice" class="notice-info">
    Audio: speaker active — web streaming requires hardware modification
  </div>

  <!-- ========================================================
       CONTROLS
  ======================================================== -->
  <section id="controls-section">

    <!-- Tuning row -->
    <div class="control-row">
      <button id="btn-seek-down" class="btn btn-secondary" title="Seek down">&#9664;&#9664;</button>
      <button id="btn-step-down" class="btn btn-secondary" title="Step down">&#9664;</button>
      <input type="number" id="freq-input" class="freq-input" placeholder="Freq (MHz)" step="0.1">
      <button id="btn-tune" class="btn btn-primary">Tune</button>
      <button id="btn-step-up" class="btn btn-secondary" title="Step up">&#9654;</button>
      <button id="btn-seek-up" class="btn btn-secondary" title="Seek up">&#9654;&#9654;</button>
    </div>
    <div id="seek-indicator" class="hidden" style="font-size:12px;color:var(--yellow);padding:2px 0;">
      Seeking&hellip;
    </div>

    <!-- Mode row -->
    <div class="control-row" id="mode-row">
      <span class="control-label">Mode:</span>
      <div class="btn-group" id="mode-buttons">
        <button class="btn btn-mode active" data-mode="FM">FM</button>
        <button class="btn btn-mode" data-mode="AM">AM</button>
        <button class="btn btn-mode" data-mode="USB">USB</button>
        <button class="btn btn-mode" data-mode="LSB">LSB</button>
        <button class="btn btn-mode" data-mode="CW">CW</button>
      </div>
    </div>

    <!-- Band selector -->
    <div class="control-row">
      <span class="control-label">Band:</span>
      <select id="band-select"></select>
    </div>

    <!-- Volume + AGC -->
    <div class="control-row">
      <span class="control-label">Vol:</span>
      <input type="range" id="volume-slider" min="0" max="63" value="40" class="slider">
      <span id="volume-value" class="slider-value">40</span>
      <label class="toggle-label" title="Automatic Gain Control">
        <input type="checkbox" id="agc-toggle" checked> AGC
      </label>
    </div>

    <!-- BFO row (shown only in SSB/CW) -->
    <div class="control-row" id="bfo-row" style="display:none">
      <span class="control-label">BFO:</span>
      <input type="range" id="bfo-slider" min="-3000" max="3000" value="0" class="slider">
      <span id="bfo-value" class="slider-value">0 Hz</span>
      <button id="btn-bfo-reset" class="btn btn-secondary btn-small">Reset</button>
    </div>

  </section>

  <!-- ========================================================
       MEMORY CHANNELS
  ======================================================== -->
  <section id="memory-section">
    <div class="section-header">Memory Channels</div>
    <div id="memory-slots" class="memory-slots-grid"></div>
    <div class="control-row" style="margin-top:6px">
      <span class="control-label">Slot:</span>
      <select id="mem-slot-select" class="freq-input" style="width:60px">
        <option value="0">0</option><option value="1">1</option><option value="2">2</option>
        <option value="3">3</option><option value="4">4</option><option value="5">5</option>
        <option value="6">6</option><option value="7">7</option><option value="8">8</option>
        <option value="9">9</option>
      </select>
      <input type="text" id="mem-name" class="freq-input" placeholder="Label (optional)" style="flex:1;max-width:160px">
      <button id="btn-mem-save" class="btn btn-secondary btn-small">Save current</button>
    </div>
  </section>

  <!-- ========================================================
       FOOTER / STATUS
  ======================================================== -->
  <footer>
    <span id="footer-ts"></span>
    <a href="/wifi" class="btn btn-secondary btn-small" style="text-decoration:none">&#8984; Wi-Fi Setup</a>
  </footer>

  <script src="/js/app.js"></script>
</body>
</html>
